<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Neon Board</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Neon Board</h1>
        <div class="card">
            <h2>회원가입</h2>
            <form id="signupForm">
                <input type="text" id="username" placeholder="사용자 이름" required>
                <input type="email" id="email" placeholder="이메일" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <button type="submit">가입하기</button>
            </form>
            <p id="errorMessage" class="error"></p>
            <p style="text-align: center; margin-top: 20px;">
                이미 계정이 있나요? <a href="/login.html">로그인</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('회원가입 성공! 로그인해주세요.');
                    window.location.href = '/login.html';
                } else {
                    errorMessage.textContent = data.message || '회원가입에 실패했습니다.';
                }
            } catch (err) {
                errorMessage.textContent = '서버 통신 에러가 발생했습니다.';
            }
        });
    </script>
</body>
</html>
