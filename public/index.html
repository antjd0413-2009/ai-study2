<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈 - Neon Board</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .post-card {
            border: 1px solid #FFA500;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .post-card:hover {
            background-color: #222;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #FF8C00;
            margin-bottom: 10px;
        }
        .post-title {
            font-size: 1.2em;
            font-weight: bold;
        }
        .post-footer {
            margin-top: 10px;
            font-size: 0.8em;
            text-align: right;
        }
        #writeBtn {
            display: none;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/index.html">홈</a>
        <span id="userInfo"></span>
        <a href="#" id="logoutBtn" style="display: none;">로그아웃</a>
        <a href="/login.html" id="loginBtn">로그인</a>
    </nav>
    <div class="container">
        <h1>Neon Board</h1>
        
        <button id="writeBtn" onclick="location.href='/write.html'">글쓰기</button>

        <div id="postList">
            <p>게시글을 불러오는 중...</p>
        </div>
    </div>

    <script>
        let currentUser = null;

        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me');
                if (response.ok) {
                    currentUser = await response.json();
                    document.getElementById('userInfo').textContent = `${currentUser.username}님`;
                    document.getElementById('logoutBtn').style.display = 'inline';
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('writeBtn').style.display = 'block';
                }
            } catch (err) {
                console.error('인증 체크 실패');
            }
        }

        async function fetchPosts() {
            try {
                const response = await fetch('/api/posts');
                const posts = await response.json();
                const postList = document.getElementById('postList');
                postList.innerHTML = '';

                if (posts.length === 0) {
                    postList.innerHTML = '<p>게시글이 없습니다.</p>';
                    return;
                }

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.onclick = () => location.href = `/post.html?id=${post.id}`;
                    
                    const date = new Date(post.created_at).toLocaleDateString();
                    
                    card.innerHTML = `
                        <div class="post-header">
                            <span>${post.username}</span>
                            <span>${date}</span>
                        </div>
                        <div class="post-title">${post.title}</div>
                        <div class="post-footer">
                            추천 ${post.recommendations}
                        </div>
                    `;
                    postList.appendChild(card);
                });
            } catch (err) {
                document.getElementById('postList').innerHTML = '<p>게시글을 불러오는 데 실패했습니다.</p>';
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.reload();
        });

        checkAuth();
        fetchPosts();
    </script>
</body>
</html>
